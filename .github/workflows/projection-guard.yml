name: public-projection-guard

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  projection-guard:
    name: public-projection-guard
    runs-on: ubuntu-latest
    steps:
      - name: Validate generated projection without executing pull-request code
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          node <<'NODE'
          (async () => {
            const token = process.env.GH_TOKEN;
            const repository = process.env.REPOSITORY;
            const pullNumber = process.env.PR_NUMBER;
            const body = process.env.PR_BODY ?? "";
            const headRef = process.env.HEAD_REF;
            const headSha = process.env.HEAD_SHA;
            const headRepository = process.env.HEAD_REPOSITORY;
            const headers = {
              Accept: "application/vnd.github+json",
              Authorization: `Bearer ${token}`,
              "X-GitHub-Api-Version": "2022-11-28",
            };
            const assert = (condition, message) => {
              if (!condition) throw new Error(message);
            };

            assert(headRepository === repository, "Projection pull requests must originate from this repository.");
            assert(headRef === "projection/quiet-systems", "Only projection/quiet-systems may update the generated profile.");
            assert(
              /^Source: greygoody\/greygoody-private@[0-9a-f]{40}$/mu.test(body),
              "Pull request body lacks valid private-source provenance.",
            );

            const changedFiles = [];
            for (let page = 1; ; page += 1) {
              const response = await fetch(
                `https://api.github.com/repos/${repository}/pulls/${pullNumber}/files?per_page=100&page=${page}`,
                { headers },
              );
              assert(response.ok, `Unable to inspect pull request files: ${response.status} ${await response.text()}`);
              const batch = await response.json();
              changedFiles.push(...batch);
              if (batch.length < 100) break;
            }

            const allowedPaths = new Set([
              "README.md",
              "assets/profile-light.svg",
              "assets/profile-dark.svg",
            ]);
            assert(changedFiles.length > 0, "Projection pull request contains no file changes.");
            for (const file of changedFiles) {
              assert(allowedPaths.has(file.filename), `Unauthorized public path: ${file.filename}`);
              assert(file.status !== "removed", `Generated public file may not be removed: ${file.filename}`);
            }

            async function readCandidate(path) {
              const encodedPath = path.split("/").map(encodeURIComponent).join("/");
              const response = await fetch(
                `https://api.github.com/repos/${repository}/contents/${encodedPath}?ref=${headSha}`,
                { headers },
              );
              assert(response.ok, `Unable to read candidate ${path}: ${response.status} ${await response.text()}`);
              const payload = await response.json();
              assert(payload.encoding === "base64", `Unexpected encoding for ${path}.`);
              return Buffer.from(payload.content.replace(/\s/gu, ""), "base64").toString("utf8");
            }

            const readme = await readCandidate("README.md");
            assert(Buffer.byteLength(readme, "utf8") <= 14_000, "README exceeds the locked size budget.");
            assert(readme.startsWith("<picture>"), "README must begin with the responsive profile header.");
            assert(readme.includes("./assets/profile-light.svg"), "README must reference the light profile asset.");
            assert(readme.includes("./assets/profile-dark.svg"), "README must reference the dark profile asset.");

            const sections = [
              "01 / PROFILE",
              "02 / CURRENT SYSTEMS",
              "03 / ENGINEERING SURFACE",
              "04 / OPERATING RULE",
            ];
            let previousIndex = -1;
            for (const section of sections) {
              const index = readme.indexOf(section);
              assert(index > previousIndex, `README section missing or out of order: ${section}`);
              previousIndex = index;
            }

            const forbiddenMarkers = [
              "greygoody-private",
              "private/",
              "shields.io",
              "readme-typing-svg",
              "visitor-badge",
              "<script",
              "<iframe",
              "<style",
              "javascript:",
              "data:image",
              "BEGIN PRIVATE KEY",
              "github_pat_",
              "ghp_",
              "password=",
            ];
            for (const marker of forbiddenMarkers) {
              assert(!readme.includes(marker), `README contains forbidden marker: ${marker}`);
            }
            const htmlTags = [...readme.matchAll(/<\/?([A-Za-z][\w:-]*)\b/gu)].map((match) => match[1]);
            const allowedHtmlTags = new Set(["picture", "source", "img", "br", "sub"]);
            for (const tag of htmlTags) assert(allowedHtmlTags.has(tag), `README contains unsupported HTML tag: ${tag}`);
            const projectRows = (readme.match(/^\| `(?:active|prototype|closure|parked)` \|/gmu) ?? []).length;
            assert(projectRows >= 1 && projectRows <= 4, "README must expose 1–4 bounded project rows.");

            const themes = {
              light: new Set(["#f7f7f8", "#161719", "#667085", "#d9dce1", "#5267d8"]),
              dark: new Set(["#0d0f12", "#f2f4f7", "#98a2b3", "#2a2e35", "#91a4ff"]),
            };
            for (const [theme, palette] of Object.entries(themes)) {
              const path = `assets/profile-${theme}.svg`;
              const svg = await readCandidate(path);
              assert(Buffer.byteLength(svg, "utf8") <= 20_000, `${path} exceeds the locked size budget.`);
              assert(svg.includes('viewBox="0 0 1200 344"'), `${path} changed the locked canvas.`);
              assert(svg.includes("GREYGOODY / QUIET SYSTEMS"), `${path} changed the design identity.`);
              assert(svg.includes("CURRENT OBJECTIVE"), `${path} lost the objective label.`);
              assert(svg.includes("-apple-system"), `${path} lost the interface sans stack.`);
              assert(svg.includes("ui-monospace"), `${path} lost the interface mono stack.`);
              assert(/<title\b/u.test(svg) && /<desc\b/u.test(svg), `${path} must retain accessible title and description.`);
              assert(!/<(?:animate|foreignObject|image|use|script|style)\b/iu.test(svg), `${path} contains a forbidden element.`);
              assert(!/(?:href=|url\(|data:|javascript:)/iu.test(svg), `${path} contains an external or embedded resource.`);

              const tags = [...svg.matchAll(/<\/?([A-Za-z][\w:-]*)\b/gu)].map((match) => match[1]);
              const allowedSvgTags = new Set(["svg", "title", "desc", "rect", "line", "text"]);
              for (const tag of tags) assert(allowedSvgTags.has(tag), `${path} contains unsupported SVG tag: ${tag}`);

              const colors = new Set((svg.match(/#[0-9a-fA-F]{6}/gu) ?? []).map((color) => color.toLowerCase()));
              for (const color of colors) assert(palette.has(color), `${path} uses color outside the locked palette: ${color}`);
              const textNodes = (svg.match(/<text\b/gu) ?? []).length;
              assert(textNodes >= 8 && textNodes <= 12, `${path} changed the locked text density.`);
            }

            console.log(`Validated ${changedFiles.length} generated public file change(s).`);
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : error);
            process.exit(1);
          });
          NODE
